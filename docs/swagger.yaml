basePath: /v1
definitions:
  main.CreateCommentPayload:
    properties:
      content:
        maxLength: 1000
        type: string
    required:
    - content
    type: object
  main.CreatePostPayload:
    properties:
      content:
        maxLength: 100
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        maxLength: 1000
        minLength: 1
        type: string
    required:
    - content
    - title
    type: object
  main.CreateUserTokenPayload:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
    required:
    - email
    - password
    type: object
  main.RegisterUserPayload:
    properties:
      email:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
      username:
        maxLength: 100
        type: string
    required:
    - email
    - password
    - username
    type: object
  main.UpdatePostPayload:
    properties:
      content:
        maxLength: 1000
        type: string
      title:
        maxLength: 100
        type: string
    type: object
  main.UserWithToken:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      token:
        type: string
      username:
        type: string
    type: object
  main.envelopeErr:
    properties:
      error:
        type: string
    type: object
  main.envelopeSuccess:
    properties:
      data: {}
    type: object
  main.healthResp:
    properties:
      env:
        type: string
      status:
        type: string
      version:
        type: string
    type: object
  store.Comment:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      post_id:
        type: integer
      user:
        $ref: '#/definitions/store.User'
      user_id:
        type: integer
    type: object
  store.Post:
    properties:
      comments:
        items:
          $ref: '#/definitions/store.Comment'
        type: array
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/store.User'
      user_id:
        type: integer
      version:
        type: integer
    type: object
  store.PostWithMetadata:
    properties:
      comments:
        items:
          $ref: '#/definitions/store.Comment'
        type: array
      comments_count:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/store.User'
      user_id:
        type: integer
      version:
        type: integer
    type: object
  store.Role:
    properties:
      description:
        type: string
      id:
        type: integer
      level:
        type: integer
      name:
        type: string
    type: object
  store.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      role:
        $ref: '#/definitions/store.Role'
      role_id:
        type: integer
      username:
        type: string
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for Social app.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Social API
paths:
  /authentication/token:
    post:
      consumes:
      - application/json
      description: Creates a token for a user whih then should be added into "Authorization"
        header for user identification
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.CreateUserTokenPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Token
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      summary: Creates a token
      tags:
      - authentication
  /authentication/user:
    post:
      consumes:
      - application/json
      description: Register a new user and send the invitation email for activation
      parameters:
      - description: User credentials
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/main.RegisterUserPayload'
      produces:
      - application/json
      responses:
        "201":
          description: User registered
          schema:
            $ref: '#/definitions/main.UserWithToken'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      summary: Register user
      tags:
      - authentication
  /health:
    get:
      description: Health check of an app
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/main.envelopeSuccess'
            - properties:
                data:
                  $ref: '#/definitions/main.healthResp'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Health check
      tags:
      - ops
  /posts:
    post:
      consumes:
      - application/json
      description: Create new post
      parameters:
      - description: Post data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.CreatePostPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/main.envelopeSuccess'
            - properties:
                data:
                  $ref: '#/definitions/store.Post'
              type: object
        "400":
          description: User payload missing
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Create post
      tags:
      - posts
  /posts/{postID}:
    delete:
      description: Delete existing post
      parameters:
      - description: postID
        in: path
        name: postID
        required: true
        type: integer
      responses:
        "204":
          description: Post deleted successfully
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Delete post
      tags:
      - posts
    get:
      consumes:
      - application/json
      description: Get Post by ID
      parameters:
      - description: postID
        in: path
        name: postID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/main.envelopeSuccess'
            - properties:
                data:
                  $ref: '#/definitions/store.Post'
              type: object
        "400":
          description: User payload missing
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Get user post
      tags:
      - posts
    patch:
      consumes:
      - application/json
      description: Update existing post
      parameters:
      - description: Post ID
        in: path
        name: postID
        required: true
        type: integer
      - description: post data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.UpdatePostPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/main.envelopeSuccess'
            - properties:
                data:
                  $ref: '#/definitions/store.Post'
              type: object
        "400":
          description: User payload missing
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Update post
      tags:
      - posts
  /posts/{postID}/comments:
    post:
      consumes:
      - application/json
      description: Create a new comment
      parameters:
      - description: Post ID
        in: path
        name: postID
        required: true
        type: integer
      - description: Comment data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.CreateCommentPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/main.envelopeSuccess'
            - properties:
                data:
                  $ref: '#/definitions/store.Comment'
              type: object
        "400":
          description: User payload missing
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Create a comment
      tags:
      - comments
  /users/{userID}:
    get:
      consumes:
      - application/json
      description: Get user info by ID
      parameters:
      - description: userID
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/main.envelopeSuccess'
            - properties:
                data:
                  $ref: '#/definitions/store.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Get user info
      tags:
      - users
  /users/{userID}/follow:
    put:
      consumes:
      - application/json
      description: Follows a user by ID
      parameters:
      - description: userID
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: User followed
        "400":
          description: User payload missing
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "409":
          description: User already followed
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Follows a user
      tags:
      - users
  /users/{userID}/unfollow:
    put:
      consumes:
      - application/json
      description: Unfollows a user by ID
      parameters:
      - description: userID
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: User unfollowed
        "400":
          description: User payload missing
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Unfollows a user
      tags:
      - users
  /users/activate/{token}:
    put:
      description: Activates/Register a user by invitation token
      parameters:
      - description: Invitation token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: User activated
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      summary: Activates/Register a user
      tags:
      - users
  /users/feed:
    get:
      consumes:
      - application/json
      description: Fetches the user feed
      parameters:
      - description: Since
        in: query
        name: since
        type: string
      - description: Until
        in: query
        name: until
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: Sort
        in: query
        name: sort
        type: string
      - description: Tags
        in: query
        name: tags
        type: string
      - description: Search
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/main.envelopeSuccess'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/store.PostWithMetadata'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.envelopeErr'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.envelopeErr'
      security:
      - ApiKeyAuth: []
      summary: Fetches the user feed
      tags:
      - feed
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
